<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Sauro GPS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0f1117;
      color: white;
      overflow: hidden;
    }

    #mapa {
      height: 100vh;
      width: 100vw;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .navbar {
      background: #1a1d27;
      height: 70px;
      padding: 0 20px;
      border-bottom: 2px solid #1976d2;
      z-index: 2000;
      position: relative;
    }

    .panel-flotante {
      position: absolute;
      top: 90px;
      background: rgba(26, 29, 39, 0.95);
      border: 1px solid #3a3f55;
      padding: 15px;
      border-radius: 8px;
      z-index: 1000;
      width: 300px;
    }

    #overlay-resultados {
      position: absolute;
      top: 80px;
      left: 20px;
      background: rgba(26, 29, 39, 0.95);
      border: 1px solid #3a3f55;
      padding: 15px;
      border-radius: 8px;
      z-index: 1000;
      width: 300px;
      /* IMPORTANTE: esto asegura que el contenido sea visible y no se desborde */
      color: white;
      pointer-events: auto;
    }

    #overlay-puntos {
      right: 20px;
    }

    .btn-sm {
      font-size: 12px;
    }

    select,
    input {
      background: #252836;
      color: white;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 5px;
    }

    /* Estilos extras necesarios */
    .metrica {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .alerta {
      background: #7f1d1d;
      padding: 5px;
      font-size: 11px;
      margin-top: 10px;
      border-radius: 4px;
    }

    .ruta-alterna-btn {
      background: #37474f;
      border: none;
      color: white;
      width: 100%;
      margin-top: 5px;
      font-size: 11px;
      padding: 5px;
    }

    #loader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #loader.visible {
      display: flex;
    }
  </style>
</head>

<body>

  <div id="loader">
    <div class="spinner-border text-primary"></div>
    <p id="loader-msg">Calculando...</p>
  </div>

  <nav class="navbar navbar-dark d-flex justify-content-between">
    <div class="d-flex gap-2">
      <select id="sel-algoritmo">{% for a in algoritmos %}<option value="{{ a.id }}">{{ a.nombre }}</option>{% endfor %}
      </select>
      <div class="d-flex align-items-center gap-2">
      <input type="checkbox" id="chk-evitar-riesgo">
      <small style="color: #ff1744;">Evitar Riesgos</small>
    </div>
      <div class="d-flex align-items-center"><input type="checkbox" id="chk-alternas" class="me-1">
      </div>
    </div>
    
    <h2 style="color: #64b5f6; margin:0;">SAURO</h2>
    <div class="d-flex gap-2">
      <button class="btn btn-danger btn-sm" onclick="limpiarPuntos()">Limpiar</button>
      <button class="btn btn-primary btn-sm" id="btn-calcular" onclick="calcularRuta()">Calcular</button>
      <button class="btn btn-success btn-sm" onclick="centrarGPS()">GPS</button>
    </div>
  </nav>

  <div id="overlay-resultados" class="panel-flotante" style="display:none">
    <div id="resultados">
      <h6>Resultados</h6>
      <div id="metricas"></div>
      <div id="alerta-combustible"></div>
      <div id="lista-alternas"></div>
    </div>
  </div>

  <div id="overlay-puntos" class="panel-flotante">
    <h6>Puntos Seleccionados</h6>
    <input type="text" id="nombre-punto" placeholder="Nombre punto..." class="w-100 mb-2">
    <button class="btn btn-secondary w-100 btn-sm" onclick="agregarPuntoManual()">+ Agregar manual</button>
    <div id="lista-puntos" class="mt-2"></div>
  </div>

  <div id="mapa"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Inicialización Mapa
    const mapa = L.map('mapa').setView([19.4326, -99.1332], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(mapa);

    // ═══════════════════════════════════════════════════════════
    // ESTADO GLOBAL
    // ═══════════════════════════════════════════════════════════
    let puntos = [];          // [{nombre, lat, lng}]
    let marcadores = [];          // marcadores Leaflet
    let capaRuta = null;        // polyline ruta principal
    let capasAlternas = [];          // polylines alternas
    let marcadorGPS = null;        // marcador posición ESP32
    let capasCasetas = [];
    let capasTrafico = [];

    // Colores por algoritmo
    const COLORES = {
      astar: '#2196f3',
      costo_uniforme: '#4caf50',
      genetico: '#ff9800',
    };
    const COLORES_ALT = ['#ff5722', '#9c27b0'];

    // ═══════════════════════════════════════════════════════════
    // ICONOS PERSONALIZADOS
    // ═══════════════════════════════════════════════════════════
    function iconoPunto(tipo) {
      const colores = { origen: '#4caf50', destino: '#f44336', intermedio: '#2196f3' };
      const color = colores[tipo] || '#2196f3';
      return L.divIcon({
        className: '',
        html: `<div style="
      width:14px; height:14px; border-radius:50%;
      background:${color}; border:2px solid #fff;
      box-shadow:0 0 6px rgba(0,0,0,.5)"></div>`,
        iconAnchor: [7, 7],
      });
    }

    // ═══════════════════════════════════════════════════════════
    // CLIC EN EL MAPA → AGREGAR PUNTO
    // ═══════════════════════════════════════════════════════════
    mapa.on('click', function (e) {
      const nombre = document.getElementById('nombre-punto').value.trim()
        || `Punto ${puntos.length + 1}`;
      document.getElementById('nombre-punto').value = '';
      agregarPunto(nombre, e.latlng.lat, e.latlng.lng);
    });

    function agregarPuntoManual() {
      const nombre = document.getElementById('nombre-punto').value.trim();
      if (!nombre) { alert('Escribe un nombre para el punto.'); return; }
      // Usar centro del mapa como posición
      const centro = mapa.getCenter();
      agregarPunto(nombre, centro.lat, centro.lng);
      document.getElementById('nombre-punto').value = '';
    }
    function agregarPunto(nombre, lat, lng) {
      lat = parseFloat(lat);
      lng = parseFloat(lng);

      if (isNaN(lat) || isNaN(lng)) {
        alert('Coordenadas inválidas.'); return;
      }

      // Evitar nombre duplicado
      if (puntos.find(p => p.nombre === nombre)) {
        nombre += `_${puntos.length}`;
      }

      puntos.push({ nombre, lat, lng });

      const tipo = puntos.length === 1 ? 'origen' : 'intermedio';
      const m = L.marker([lat, lng], { icon: iconoPunto(tipo) })
        .addTo(mapa)
        .bindPopup(`<b>${nombre}</b><br>${lat.toFixed(5)}, ${lng.toFixed(5)}`);
      marcadores.push(m);

      renderizarListaPuntos();
    }

    function renderizarListaPuntos() {
      const ul = document.getElementById('lista-puntos');
      ul.innerHTML = '';

      puntos.forEach((p, i) => {
        const tipo = i === 0 ? 'origen' : (i === puntos.length - 1 ? 'destino' : 'inter');
        const label = i === 0 ? 'Origen' : (i === puntos.length - 1 ? 'Destino' : 'Parada');

        // Actualizar icono del marcador
        if (marcadores[i]) {
          marcadores[i].setIcon(iconoPunto(
            i === 0 ? 'origen' : (i === puntos.length - 1 ? 'destino' : 'intermedio')
          ));
        }

        ul.innerHTML += `
      <div class="punto-item">
        <span>${p.nombre}
          <span class="punto-tipo tipo-${tipo}">${label}</span>
        </span>
        <button class="btn-rm" onclick="eliminarPunto(${i})">✕</button>
      </div>`;
      });
    }

    function eliminarPunto(i) {
      mapa.removeLayer(marcadores[i]);
      marcadores.splice(i, 1);
      puntos.splice(i, 1);
      renderizarListaPuntos();
    }

    function limpiarPuntos() {
      marcadores.forEach(m => mapa.removeLayer(m));
      marcadores = []; puntos = [];
      limpiarCapasRuta();
      document.getElementById('lista-puntos').innerHTML = '';
      document.getElementById('resultados').style.display = 'none';
    }

    // ═══════════════════════════════════════════════════════════
    // CALCULAR RUTA
    // ═══════════════════════════════════════════════════════════
    async function calcularRuta() {
    if (puntos.length < 2) {
        alert('Agrega al menos 2 puntos (origen y destino).'); 
        return;
    }

    const algoritmo = document.getElementById('sel-algoritmo').value;
    const chkEvitar = document.getElementById('chk-evitar-riesgo');
    
    // Serializar puntos
    const puntos_serializados = puntos.map(p => ({
        nombre: p.nombre, lat: parseFloat(p.lat), lng: parseFloat(p.lng)
    }));

    mostrarLoader(`Calculando con ${algoritmo.toUpperCase()}…`);
    limpiarCapasRuta();

    try {
        const resp = await fetch('/api/ruta/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({
                algoritmo: algoritmo,
                origen: puntos[0].nombre,
                destino: puntos[puntos.length - 1].nombre,
                puntos: puntos_serializados,
                rutas_alternas: document.getElementById('chk-alternas').checked,
                evitar_riesgo: chkEvitar ? chkEvitar.checked : false
            }),
        });

        const data = await resp.json();
        if (data.error) throw new Error(data.error);

        // Dibujar
        dibujarRuta(data.polilinea, COLORES[algoritmo] || '#2196f3', 5, 'Ruta principal');
        if (data.polilinea?.length > 0) mapa.fitBounds(data.polilinea);
        
        mostrarResultados(data, algoritmo);
    } catch (e) {
        alert('Error: ' + e.message);
    } finally {
        ocultarLoader();
    }
}
    
    // ═══════════════════════════════════════════════════════════
    // DIBUJAR EN EL MAPA
    // ═══════════════════════════════════════════════════════════
    function dibujarRuta(polilinea, color, peso, label, esAlterna = false, idx = 0) {
      if (!polilinea || polilinea.length === 0) return;

      const linea = L.polyline(polilinea, {
        color, weight: peso, opacity: esAlterna ? 0.6 : 0.9,
        dashArray: esAlterna ? '8,6' : null,
      }).addTo(mapa).bindPopup(`<b>${label}</b>`);

      if (esAlterna) capasAlternas[idx] = linea;
      else capaRuta = linea;
    }

    function limpiarCapasRuta() {
      if (capaRuta) { mapa.removeLayer(capaRuta); capaRuta = null; }
      capasAlternas.forEach(c => { if (c) mapa.removeLayer(c); });
      capasAlternas = [];
    }

    // ═══════════════════════════════════════════════════════════
    // MOSTRAR RESULTADOS
    // ═══════════════════════════════════════════════════════════
    function mostrarResultados(data, algoritmo) {
      // Aseguramos que los paneles sean visibles
      const overlay = document.getElementById('overlay-resultados');
      overlay.style.display = 'block';
      document.getElementById('resultados').style.display = 'block';

      const met = document.getElementById('metricas');
      
      // Cálculo de tiempo formato legible
      const hor = Math.floor(data.tiempo_min / 60);
      const min = Math.round(data.tiempo_min % 60);
      const tStr = hor > 0 ? `${hor}h ${min}min` : `${min} min`;

      // 1. Construcción del HTML base (Métricas)
      let html = `
        <div class="metrica"><span>Algoritmo</span><span>${algoritmo}</span></div>
        <div class="metrica"><span>Distancia</span><span>${data.distancia_km} km</span></div>
        <div class="metrica"><span>Tiempo</span><span>${tStr}</span></div>
        <hr style="border: 0; border-top: 1px solid #444; margin: 5px 0;">
        <div class="metrica"><span>Salida</span><span>${data.hora_salida}</span></div>
        <div class="metrica"><span>Llegada</span><span>${data.hora_llegada} <small>(${data.zona_llegada})</small></span></div>
        <hr style="border: 0; border-top: 1px solid #444; margin: 5px 0;">
        <div class="metrica"><span>Gasolina</span><span>${data.combustible_L.toFixed(2)} L</span></div>
        <div class="metrica"><span>Costo Comb.</span><span>$${data.costo_gasolina.toFixed(2)}</span></div>
      `;

      // 2. Sección dinámica de Casetas
      if (data.casetas && data.casetas.length > 0) {
        html += `
          <hr style="border: 0; border-top: 1px solid #444; margin: 5px 0;">
          <div style="font-size: 12px; margin-bottom:5px; color:#f9a825;"><b>Peajes en ruta (${data.casetas.length}):</b></div>
          <ul style="padding-left: 20px; font-size: 11px; color: #ccc;">
            ${data.casetas.map(c => `<li>${c.nombre}: $${c.costo}</li>`).join('')}
          </ul>
          <div class="metrica" style="font-weight:bold; font-size: 14px; color:#4caf50;">
            <span>Total Peajes</span><span>$${data.costo_casetas.toFixed(2)}</span>
          </div>
        `;
      } else {
        html += `<div class="metrica" style="font-size: 11px; color: #888;">No hay casetas en esta ruta.</div>`;
      }

      met.innerHTML = html;

      // 3. Mostrar alternas si existen
      if (data.alternas && data.alternas.length > 0) {
        mostrarAlternas(data.alternas);
      } else {
        document.getElementById('lista-alternas').innerHTML = '';
      }
    }
    
    function mostrarAlternas(alternas) {
      const div = document.getElementById('lista-alternas');
      div.innerHTML = '<p style="font-size:11px;color:#667;margin:8px 0 4px">Rutas alternas:</p>';

      alternas.forEach((alt, i) => {
        const horas = Math.floor(alt.tiempo_min / 60);
        const minutos = Math.round(alt.tiempo_min % 60);
        const tiempo = horas > 0 ? `${horas}h ${minutos}min` : `${minutos}min`;

        div.innerHTML += `
      <button class="ruta-alterna-btn" onclick="resaltarAlterna(${i})">
        Alterna ${i + 1} — ${alt.distancia_km} km · ${tiempo}
      </button>`;
      });
    }

    function resaltarAlterna(i) {
      capasAlternas.forEach((c, j) => {
        if (!c) return;
        c.setStyle({ weight: j === i ? 5 : 3, opacity: j === i ? 0.9 : 0.4 });
      });
      document.querySelectorAll('.ruta-alterna-btn').forEach((b, j) => {
        b.classList.toggle('activa', j === i);
      });
      if (capasAlternas[i]) mapa.fitBounds(capasAlternas[i].getBounds());
    }

    async function cargarZonasRiesgo() {
      try {
        const resp = await fetch('/api/zonas-riesgo/');
        const data = await resp.json();
        data.zonas.forEach(z => {
          L.circle([z.lat, z.lng], {
            radius: z.radio_km * 1000,
            color: '#ff1744',
            fillColor: '#ff1744',
            fillOpacity: 0.3
          }).addTo(mapa).bindPopup(`<b>${z.nombre}</b>`);
        });
      } catch (e) { console.error("Error cargando zonas de riesgo"); }
    }

    // Llama a esta función en la sección de ARRANQUE
    cargarZonasRiesgo();

    // Actualiza calcularRuta() para enviar el nuevo parámetro
    const body = {
      // ... tus otros campos ...
      evitar_riesgo: document.getElementById('chk-evitar-riesgo').checked
    };

    // ═══════════════════════════════════════════════════════════
    // POSICIÓN GPS (ESP32)
    // ═══════════════════════════════════════════════════════════
    async function centrarGPS() {
      try {
        const resp = await fetch('/api/gps/ultima/');
        if (!resp.ok) { alert('Sin datos GPS aún.'); return; }
        const data = await resp.json();

        if (marcadorGPS) mapa.removeLayer(marcadorGPS);

        marcadorGPS = L.circleMarker([data.lat, data.lng], {
          radius: 10, color: '#00e5ff', fillColor: '#00e5ff',
          fillOpacity: 0.8, weight: 2,
        }).addTo(mapa)
          .bindPopup(`<b>📡 ESP32</b><br>${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}<br>${data.timestamp}`)
          .openPopup();

        mapa.setView([data.lat, data.lng], 14);
      } catch (e) {
        alert('Error al obtener GPS: ' + e.message);
      }
    }

    // Actualizar posición GPS cada 5 segundos
    setInterval(async () => {
      try {
        const resp = await fetch('/api/gps/ultima/');
        if (!resp.ok) return;
        const data = await resp.json();
        if (marcadorGPS) {
          marcadorGPS.setLatLng([data.lat, data.lng]);
        }
      } catch (_) { }
    }, 5000);

    // ═══════════════════════════════════════════════════════════
    // CARGAR CASETAS Y ZONAS DE TRÁFICO
    // ═══════════════════════════════════════════════════════════
    async function cargarCapasExtras() {
      // Casetas
      try {
        const r = await fetch('/api/casetas/');
        const d = await r.json();
        d.casetas.forEach(c => {
          L.marker([c.latitud, c.longitud], {
            icon: L.divIcon({
              className: '',
              html: `<div style="
            background:#f9a825; border:2px solid #fff;
            border-radius:4px; padding:2px 5px;
            font-size:10px; font-weight:700; color:#000;
            white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,.4)">
            💰 $${c.costo}</div>`,
              iconAnchor: [20, 10],
            })
          }).addTo(mapa).bindPopup(`<b>${c.nombre}</b><br>Peaje: $${c.costo} MXN`);
        });
      } catch (_) { }

      // Zonas de tráfico
      try {
        const r = await fetch('/api/trafico/');
        const d = await r.json();
        const coloresTrafico = {
          bajo: '#8bc34a', medio: '#ff9800', alto: '#f44336', critico: '#7b1fa2'
        };
        d.zonas.forEach(z => {
          L.circle([z.latitud_centro, z.longitud_centro], {
            radius: z.radio_km * 1000,
            color: coloresTrafico[z.nivel_trafico] || '#ff9800',
            fillColor: coloresTrafico[z.nivel_trafico] || '#ff9800',
            fillOpacity: 0.15,
            weight: 2,
            dashArray: '6,4',
          }).addTo(mapa)
            .bindPopup(`<b>${z.nombre}</b><br>Tráfico: ${z.nivel_trafico}`);
        });
      } catch (_) { }
    }

    // ═══════════════════════════════════════════════════════════
    // ESTADO DEL VEHÍCULO
    // ═══════════════════════════════════════════════════════════
    async function cargarVehiculo() {
      try {
        const r = await fetch('/api/vehiculo/');
        if (!r.ok) {
          document.getElementById('info-vehiculo').textContent =
            'Sin vehículo registrado. Agrégalo en el admin.';
          return;
        }
        const v = await r.json();
        document.getElementById('info-vehiculo').innerHTML = `
      <b>${v.nombre}</b> · ${v.tipo_combustible}<br>
      Combustible: <b>${v.nivel_combustible.toFixed(0)}%</b>
      · Autonomía: <b>${v.autonomia_km} km</b>
    `;
        document.getElementById('barra-combustible-wrap').style.display = 'block';
        document.getElementById('barra-combustible').style.width =
          `${v.nivel_combustible}%`;
      } catch (_) {
        document.getElementById('info-vehiculo').textContent =
          'Sin vehículo registrado.';
      }
    }

    // ═══════════════════════════════════════════════════════════
    // UTILIDADES
    // ═══════════════════════════════════════════════════════════
    function mostrarLoader(msg) {
      document.getElementById('loader-msg').textContent = msg || 'Calculando…';
      document.getElementById('loader').classList.add('visible');
      document.getElementById('btn-calcular').disabled = true;
    }

    function ocultarLoader() {
      document.getElementById('loader').classList.remove('visible');
      document.getElementById('btn-calcular').disabled = false;
    }

    function getCookie(name) {
      const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
      return v ? v.pop() : '';
    }

    // ═══════════════════════════════════════════════════════════
    // ARRANQUE
    // ═══════════════════════════════════════════════════════════
    cargarVehiculo();
    cargarCapasExtras();
  </script>
</body>

</html>
